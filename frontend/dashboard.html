<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskApp – Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <span class="brand">TaskApp</span>
    <div class="nav-links">
      <span id="welcome-user"></span>
      <button id="logout-btn" class="btn btn-danger">Logout</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="dashboard-container">
    <h2>My Tasks</h2>

    <!-- Add Task -->
    <div class="add-task-row">
      <input type="text" id="new-task-input" placeholder="Enter new task..." />
      <button id="add-task-btn" class="btn btn-success">Add Task</button>
    </div>

    <!-- Task List -->
    <ul id="task-list" class="task-list">
      <li class="loading-msg">Loading tasks...</li>
    </ul>
  </div>

  <script src="api.js"></script>
  <script>
    // Auth guard
    const token = localStorage.getItem('access_token');
    if (!token) window.location.href = 'login.html';

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('access_token');
      window.location.href = 'login.html';
    });

    // Load profile + tasks on page load
    async function init() {
      try {
        const profile = await getProfile(token);
        document.getElementById('welcome-user').textContent = `Welcome, ${profile.username}`;
        await loadTasks();
      } catch (err) {
        // Token likely expired
        localStorage.removeItem('access_token');
        window.location.href = 'login.html';
      }
    }

    async function loadTasks() {
      const tasks = await getTasks(token);
      renderTasks(tasks);
    }

    function renderTasks(tasks) {
      const list = document.getElementById('task-list');
      if (tasks.length === 0) {
        list.innerHTML = '<li class="empty-msg">No tasks yet. Add one above!</li>';
        return;
      }
      list.innerHTML = tasks.map(task => `
        <li class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}">
          <span class="task-title" onclick="toggleTask(${task.id}, ${task.completed}, '${escapeHTML(task.title)}')">
            ${escapeHTML(task.title)}
          </span>
          <button class="btn btn-danger btn-sm" onclick="removeTask(${task.id})">Delete</button>
        </li>
      `).join('');
    }

    // Add task
    document.getElementById('add-task-btn').addEventListener('click', async () => {
      const input = document.getElementById('new-task-input');
      const title = input.value.trim();
      if (!title) return;
      await createTask(token, { title });
      input.value = '';
      await loadTasks();
    });

    // Allow Enter key to add task
    document.getElementById('new-task-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('add-task-btn').click();
    });

    async function toggleTask(id, completed, title) {
      await updateTask(token, id, { title, completed: !completed });
      await loadTasks();
    }

    async function removeTask(id) {
      await deleteTask(token, id);
      await loadTasks();
    }

    function escapeHTML(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
</html>
