<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskApp – Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="brand">TaskApp</h1>
      <h2>Login</h2>
      <div id="error-msg" class="alert hidden"></div>
      <form id="login-form">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p class="switch-link">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>
  <script src="api.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('access_token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const data = await loginUser({ username, password });
        localStorage.setItem('access_token', data.access);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError('Login failed. Check your credentials.');
      }
    });

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
