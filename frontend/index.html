<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskApp – Home</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .hero .brand {
      font-size: 3rem;
      font-weight: 800;
      color: #4f46e5;
      margin-bottom: 12px;
    }
    .hero p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 36px;
      max-width: 420px;
    }
    .hero-buttons {
      display: flex;
      gap: 16px;
    }
    .btn-primary {
      background: #4f46e5;
      color: #fff;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 1rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-outline {
      background: transparent;
      color: #4f46e5;
      border: 2px solid #4f46e5;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-outline:hover { background: #4f46e5; color: #fff; }
    .features {
      display: flex;
      gap: 24px;
      margin-top: 60px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .feature-card {
      background: #fff;
      border-radius: 10px;
      padding: 24px 20px;
      width: 180px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      font-size: 0.92rem;
      color: #444;
    }
    .feature-card .icon { font-size: 2rem; margin-bottom: 10px; }
    .feature-card strong { display: block; margin-bottom: 6px; color: #1e1b4b; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="brand">✅ TaskApp</div>
    <p>A simple, clean task manager. Stay organized, get things done.</p>
    <div class="hero-buttons">
      <a href="login.html" class="btn-primary">Login</a>
      <a href="register.html" class="btn-outline">Register</a>
    </div>

    <div class="features">
      <div class="feature-card">
        <div class="icon">📝</div>
        <strong>Create Tasks</strong>
        Add tasks instantly with one click.
      </div>
      <div class="feature-card">
        <div class="icon">✔️</div>
        <strong>Track Progress</strong>
        Mark tasks complete as you go.
      </div>
      <div class="feature-card">
        <div class="icon">🔒</div>
        <strong>Secure Login</strong>
        JWT-based authentication.
      </div>
    </div>
  </div>

  <script>
    // If already logged in, skip home → go straight to dashboard
    if (localStorage.getItem('access_token')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
